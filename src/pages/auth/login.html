<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./../../../assets/khaslana-logo-green.png" type="image/x-icon">
    <link rel="stylesheet" href="./../../styles/login.css">
    <title>Khaslana</title>
</head>
<body>
    <main class="auth">
        <section class="auth-banner">
            <div class="auth-brand">
                    <img
                        src="./../../../assets/Khaslana.svg"
                        alt="Logo Khaslana"
                        class="auth-logo"
                    />
                    <p class="auth-logo-text">Khaslana</p>
            </div>
        </section>
        <section class="login-content">
            <div class="form-header">
                <a href="./../../../index.html" class="back-home-btn">
                    <img src="./../../../assets/Back.svg" alt="">
                    Beranda
                </a>
                <h1 class="login-title">
                    Selamat datang kembali
                </h1>
            </div>
            <form action="#" class="login-form">
                <div class="input-group" id="group-username">
                    <img
                        src="./../../../assets/iconamoon_profile.svg"
                        alt="icon-user"
                        class="input-icon"
                    />
                    <input
                        type="text"
                        name="username"
                        id="username"
                        placeholder="Username"
                        required
                    />
                </div>
                <div class="input-group">
                    <img
                        src="./../../../assets/prime_lock.svg"
                        alt="icon-password"
                        class="input-icon"
                    />
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder="Password"
                        required
                    />
                    <button type="button" class="view-btn">
                        <img
                            src="./../../../assets/iconoir_eye.svg"
                            alt="view-icon"
                            class="view-icon"
                        />
                    </button>
                </div>
                <div class="options-row">
                    <div class="checkbox-group">
                        <input type="checkbox" name="remember-me" id="remember-me">
                        <label for="remember-me">
                            ingat saya
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Lupa Password?</a>
                </div>
                <button type="submit" class="login-btn">Masuk</button>
                <button type="button" class="google-btn">
                    <img src="./../../../assets/material-icon-theme_google.svg" alt="google">
                    Google
                </button>
                <div class="register-link">
                    Belum punya akun? <a href="./register.html">Buat akun</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
