name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up deployment directory
        run: |
          mkdir -p deploy
          
          # copy assets
          cp -r assets deploy/assets
          
          # copy scripts
          mkdir -p deploy/src
          mkdir -p deploy/src/scripts
          cp -r src/scripts/. deploy/src/scripts/
          
          # copy styles
          mkdir -p deploy/src/styles
          cp -r src/styles/. deploy/src/styles/
          
          # copy index.html
          cp index.html deploy/index.html

          # copy all pages
          mkdir -p deploy/src/pages
          cp -r src/pages/. deploy/src/pages/
      
      # - name: Adjust relative paths in HTML files
      #   run: |
      #     # Adjust paths dari src/pages/ ke root
      #     # ./../../assets/ menjadi ./assets/
      #     sed -i 's|\.\/\.\.\/\.\.\/#|./|g' deploy/index.html
      #     sed -i 's|\./\.\.\/\.\.\/assets|./assets|g' deploy/index.html
      #     sed -i 's|\./\.\.\/styles|./styles|g' deploy/index.html
      #     sed -i 's|\./\.\.\/scripts|./scripts|g' deploy/index.html
          
      #     # Update base href sesuai repo name jika perlu
      #     sed -i 's|<base href="khaslana-uts">|<base href="/">|g' deploy/index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
