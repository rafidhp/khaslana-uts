<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./../../../assets/khaslana-logo-green.png" type="image/x-icon">
    <link rel="stylesheet" href="./../../styles/register.css">
    <title>Khaslana</title>
</head>
<body>
    <main class="auth">
        <section class="auth-banner">
            <div class="auth-brand">
                <img
                    src="./../../../assets/Khaslana.svg"
                    alt="Logo Khaslana"
                    class="auth-logo"
                />
                <p class="auth-logo-text">Khaslana</p>
            </div>
        </section>
        <section class="register-content">
            <div class="form-header">
                <a href="./../index.html" class="back-home-btn">
                    <img src="./../../../assets/Back.svg" alt="">
                    Beranda
                </a>
                <h1 class="register-title">
                    Buat Akun
                </h1>
                <p class="login-question">
                    Sudah punya akun? <a href="./../auth/login.html" class="login-link">Login</a>
                </p>
            </div>
            <form action="#" class="register-form">
                <div class="input-row">
                    <div class="input-group" id="group-username">
                        <img
                            src="./../../../assets/iconamoon_profile.svg"
                            alt="icon-user"
                            class="input-icon"
                        />
                        <input
                            type="text"
                            name="username"
                            id="username"
                            placeholder="Username"
                            required
                        />
                    </div>
                    <div class="input-group" id="group-name">
                        <img
                            src="./../../../assets/iconamoon_profile.svg"
                            alt="icon-user"
                            class="input-icon"
                        />
                        <input
                            type="text"
                            name="name"
                            id="name"
                            placeholder="Ikhsan Sawit"
                            required
                        />
                    </div>
                </div>
                <div class="input-group">
                    <img
                        src="./../../../assets/Vector.svg"
                        alt="icon-email"
                        class="input-icon"
                    />
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder="Email"
                        required
                    />
                </div>
                <div class="input-group">
                    <img
                        src="./../../../assets/prime_lock.svg"
                        alt="icon-password"
                        class="input-icon"
                    />
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder="Password"
                        required
                    />
                    <button type="button" class="view-btn">
                        <img
                            src="./../../../assets/iconoir_eye.svg"
                            alt="view-icon"
                            class="view-icon"
                        />
                    </button>
                </div>
                <div class="input-group">
                    <img
                        src="./../../../assets/prime_lock.svg"
                        alt="icon-password"
                        class="input-icon"
                    />
                    <input
                        type="password"
                        name="confirm-password"
                        id="confirm-password"
                        placeholder="Confirm Password"
                        required
                    />
                    <button type="button" class="view-btn">
                        <img
                            src="./../../../assets/iconoir_eye.svg"
                            alt="view-icon"
                            class="view-icon"
                        />
                    </button>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" name="terms" id="terms">
                    <label for="terms">
                        Saya setuju terhadap <a href="#" class="terms-info">syarat dan ketentuan</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">Buat akun</button>
                <button type="button" class="google-btn">
                    <img src="./../../../assets/material-icon-theme_google.svg" alt="google">
                    Google
                </button>
                <!-- <span class="back-to-home">
                    Kembali ke <a href="./../index.html">Beranda →</a>
                </span> -->
            </form>
        </section>
    </main>
    <script src="./../../scripts/register.js"></script>
</body>
</html>
